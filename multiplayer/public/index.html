<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SD Robot Battle - Multiplayer</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
  canvas { display: block; }

  #hud-top {
    position: fixed; top: 15px; left: 15px;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 6px;
    font-size: 12px; line-height: 1.6; pointer-events: none;
    border: 1px solid rgba(120, 200, 255, 0.3);
  }
  #hud-top b { color: #7cf; }

  #hud-right {
    position: fixed; top: 15px; right: 15px;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 6px;
    font-size: 12px; line-height: 1.6; pointer-events: none;
    border: 1px solid rgba(120, 200, 255, 0.3);
    min-width: 140px;
  }
  #hud-right b { color: #7cf; }
  .kill-msg { color: #fc6; font-size: 11px; margin-top: 4px; }

  #hud-bottom {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 380px; pointer-events: none;
  }
  .bar-container {
    background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px;
    margin-bottom: 6px; border: 1px solid rgba(120, 200, 255, 0.3);
  }
  .bar-label { font-size: 11px; margin-bottom: 3px; letter-spacing: 1px; }
  .bar-bg { height: 10px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 0.1s; }
  #hp-fill { background: linear-gradient(90deg, #0f8, #2fa); }
  #boost-fill { background: linear-gradient(90deg, #08f, #4cf); }
  .overheat { background: linear-gradient(90deg, #f40, #f80) !important; }

  .weapon-slot {
    flex: 1; background: rgba(0,0,0,0.6); padding: 8px 10px; border-radius: 4px;
    border: 1px solid rgba(120, 200, 255, 0.3); font-size: 11px;
    transition: all 0.15s;
  }
  .weapon-slot.active {
    border-color: #ffcc00; background: rgba(40, 30, 0, 0.7);
    box-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
  }
  .weapon-slot.reloading { opacity: 0.6; }
  .w-header { font-weight: bold; margin-bottom: 3px; color: #9cf; }
  .w-key { color: #fc6; margin-right: 4px; }
  .w-ammo { font-size: 16px; font-family: 'Courier New', monospace; font-weight: bold; }
  .w-status { font-size: 10px; color: #fc6; min-height: 12px; }

  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 20px; height: 20px;
    margin: -10px 0 0 -10px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.8);
  }
  #crosshair::before { left: 9px; top: 0; width: 2px; height: 20px; }
  #crosshair::after { top: 9px; left: 0; height: 2px; width: 20px; }

  #lockon-indicator {
    position: fixed; width: 60px; height: 60px;
    border: 2px solid #ff3030; border-radius: 50%;
    margin: -30px 0 0 -30px; pointer-events: none;
    display: none;
  }

  #connect-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); padding: 25px 35px; border-radius: 8px;
    font-size: 14px; text-align: center;
    border: 1px solid rgba(120, 200, 255, 0.5);
    max-width: 400px;
  }
  #connect-msg input {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(120,200,255,0.4);
    color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 14px;
    margin: 10px 0; width: 200px; text-align: center;
  }
  #connect-msg button {
    background: #2a5a8a; color: #fff; border: none; padding: 10px 20px;
    border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 10px;
  }
  #connect-msg button:hover { background: #3a7aba; }
  #status { margin-top: 10px; font-size: 11px; color: #9cf; }

  .hidden { display: none !important; }

  #damage-flash {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.4) 100%);
    pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
</style>
</head>
<body>
<div id="hud-top" class="hidden">
  <b>조작</b><br>
  WASD — 이동 / Shift — 부스트<br>
  Space — 점프 / 공중 부스트<br>
  좌클릭 — 사격 / 우클릭 — 자석 락온<br>
  Tab — 락온 전환<br>
  <b>1</b> — 기관총 / <b>2</b> — 빔포<br>
</div>

<div id="hud-right" class="hidden">
  <b>접속자</b> <span id="player-count">0</span><br>
  <span id="player-list"></span>
  <div id="kill-log"></div>
</div>

<div id="hud-bottom" class="hidden">
  <div class="bar-container">
    <div class="bar-label">HP <span id="hp-text">100 / 100</span></div>
    <div class="bar-bg"><div id="hp-fill" class="bar-fill" style="width:100%"></div></div>
  </div>
  <div class="bar-container">
    <div class="bar-label">BOOSTER <span id="boost-text">100%</span></div>
    <div class="bar-bg"><div id="boost-fill" class="bar-fill" style="width:100%"></div></div>
  </div>
  <div id="weapons-ui" style="display:flex; gap:6px; margin-top:4px;">
    <div class="weapon-slot" id="weapon-1">
      <div class="w-header"><span class="w-key">[1]</span> 기관총</div>
      <div class="w-ammo" id="w1-ammo">30 / 30</div>
      <div class="w-status" id="w1-status"></div>
    </div>
    <div class="weapon-slot" id="weapon-2">
      <div class="w-header"><span class="w-key">[2]</span> 빔포</div>
      <div class="w-ammo" id="w2-ammo">3 / 3</div>
      <div class="w-status" id="w2-status"></div>
    </div>
  </div>
</div>

<div id="crosshair" class="hidden"></div>
<div id="lockon-indicator"></div>
<div id="damage-flash"></div>

<div id="connect-msg">
  <b>SD Robot Battle (Multiplayer)</b><br>
  <br>
  <input id="name-input" type="text" placeholder="파일럿 이름" maxlength="16" />
  <br>
  <button id="connect-btn">접속</button>
  <div id="status">서버 대기 중...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }

<script type="module">
import * as THREE from 'three';

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2540);
scene.fog = new THREE.Fog(0x1a2540, 60, 250);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x6677aa, 0.6));
const sun = new THREE.DirectionalLight(0xffffee, 0.9);
sun.position.set(40, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
const d = 80;
sun.shadow.camera.left = -d; sun.shadow.camera.right = d;
sun.shadow.camera.top = d; sun.shadow.camera.bottom = -d;
scene.add(sun);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300, 300),
  new THREE.MeshStandardMaterial({ color: 0x2a3550 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(300, 60, 0x4488cc, 0x223355);
grid.material.opacity = 0.3;
grid.material.transparent = true;
scene.add(grid);

// Obstacles (must match server coords if server enforces collision - for now client-only)
const obstacles = [];
function addBox(x, z, w, h, d, color) {
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
  );
  box.position.set(x, h/2, z);
  box.castShadow = true;
  box.receiveShadow = true;
  scene.add(box);
  obstacles.push({ mesh: box, w, h, d });
}
addBox(15, 10, 5, 4, 5, 0x556677);
addBox(-12, 15, 6, 6, 6, 0x556677);
addBox(0, -20, 10, 3, 10, 0x445566);
addBox(25, -15, 4, 8, 4, 0x556677);
addBox(-25, -8, 7, 5, 4, 0x445566);
addBox(-30, 25, 8, 4, 8, 0x556677);
addBox(30, 30, 5, 6, 5, 0x445566);

// ===== Robot factory =====
function createRobot(colorPrimary, colorSecondary, accentColor) {
  const robot = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.6, 1.0, 12),
    new THREE.MeshStandardMaterial({ color: colorPrimary })
  );
  body.position.y = 0.7; body.castShadow = true; robot.add(body);

  const chest = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 0.5, 0.6),
    new THREE.MeshStandardMaterial({ color: colorSecondary })
  );
  chest.position.y = 0.9; chest.castShadow = true; robot.add(chest);

  const head = new THREE.Mesh(
    new THREE.BoxGeometry(1.1, 1.0, 1.0),
    new THREE.MeshStandardMaterial({ color: colorPrimary })
  );
  head.position.y = 1.8; head.castShadow = true; robot.add(head);

  const visor = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.22, 0.1),
    new THREE.MeshStandardMaterial({ color: accentColor, emissive: accentColor, emissiveIntensity: 0.8 })
  );
  visor.position.set(0, 1.85, 0.5);
  robot.add(visor);

  const fin = new THREE.Mesh(
    new THREE.ConeGeometry(0.08, 0.5, 4),
    new THREE.MeshStandardMaterial({ color: 0xffcc00 })
  );
  fin.position.set(0, 2.55, 0.3);
  robot.add(fin);

  const arms = [];
  for (const side of [-1, 1]) {
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.9, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xbbbbbb })
    );
    arm.position.set(side * 0.7, 0.8, 0);
    arm.castShadow = true;
    robot.add(arm);
    arms.push(arm);
  }
  const legs = [];
  for (const side of [-1, 1]) {
    const leg = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 0.8, 0.4),
      new THREE.MeshStandardMaterial({ color: colorSecondary })
    );
    leg.position.set(side * 0.3, 0.0, 0);
    leg.castShadow = true;
    robot.add(leg);
    legs.push(leg);
  }

  const thruster = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.4, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
  );
  thruster.position.set(0, 1.0, -0.4);
  robot.add(thruster);

  const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.3, 1.2, 8),
    new THREE.MeshBasicMaterial({ color: 0x44aaff, transparent: true, opacity: 0.8 })
  );
  flame.rotation.x = -Math.PI / 2;
  flame.position.set(0, 1.0, -1.2);
  flame.visible = false;
  robot.add(flame);

  return { group: robot, arms, legs, flame, visor };
}

// ===== Health bar (billboarded sprite) =====
function createHealthBar(nameText) {
  const canvas = document.createElement('canvas');
  canvas.width = 256; canvas.height = 48;
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 0.6, 1);
  return { sprite, canvas, tex, name: nameText };
}
function updateHealthBar(bar, hp, maxHp) {
  const ctx = bar.canvas.getContext('2d');
  ctx.clearRect(0, 0, 256, 48);
  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(bar.name, 128, 20);
  // HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(16, 28, 224, 14);
  const ratio = Math.max(0, hp / maxHp);
  ctx.fillStyle = ratio > 0.5 ? '#0f8' : ratio > 0.25 ? '#fc4' : '#f44';
  ctx.fillRect(18, 30, 220 * ratio, 10);
  bar.tex.needsUpdate = true;
}

// ===== Player state =====
let myId = null;
const remotePlayers = new Map(); // id -> { group, robotData, hpBar, targetX, targetY, targetZ, targetRotY, hp, alive, name, color }

let myRobotData = null;
let myGroup = null;

const playerState = {
  hp: 100, maxHp: 100,
  boost: 100, maxBoost: 100,
  overheat: false,
  walkCycle: 0,
  onGround: true,
  velocity: new THREE.Vector3(),
  fireCooldown: 0,
  hitFlash: 0,
  alive: true,
  // Weapon system
  currentWeapon: 1, // 1 = machine gun, 2 = beam cannon
  weapons: {
    1: { // Machine gun
      ammo: 30, maxAmmo: 30,
      reloading: false,
      reloadTime: 10.0,
      reloadRemaining: 0,
      cooldown: 0.12, // between shots
      range: 50,
      damage: 8
    },
    2: { // Beam cannon
      ammo: 3, maxAmmo: 3,
      reloading: false, // fully reloaded (auto recharge per shot)
      reloadTime: 20.0,
      reloadRemaining: 0,
      cooldown: 1.0, // post-fire recovery
      range: 100,
      damage: 40
    }
  },
  postFireDelay: 0 // locks actions (beam cannon backswing)
};

// ===== Weapon system =====
function switchWeapon(n) {
  if (playerState.postFireDelay > 0) return; // can't switch during beam cannon recovery
  if (playerState.currentWeapon === n) return;
  playerState.currentWeapon = n;
  playerState.fireCooldown = 0.15; // small cooldown after switch
}

function updateWeapons(dt) {
  for (const key of [1, 2]) {
    const w = playerState.weapons[key];
    if (w.reloading) {
      w.reloadRemaining -= dt;
      if (w.reloadRemaining <= 0) {
        w.ammo = w.maxAmmo;
        w.reloading = false;
      }
    }
    // Weapon 2 (beam cannon): auto-recharge 1 shot at a time
    if (key === 2 && !w.reloading && w.ammo < w.maxAmmo) {
      if (!w._recharging) {
        w._recharging = true;
        w.reloadRemaining = w.reloadTime;
      }
      w.reloadRemaining -= dt;
      if (w.reloadRemaining <= 0) {
        w.ammo = Math.min(w.ammo + 1, w.maxAmmo);
        if (w.ammo < w.maxAmmo) {
          w.reloadRemaining = w.reloadTime;
        } else {
          w._recharging = false;
        }
      }
    }
  }
  if (playerState.postFireDelay > 0) {
    playerState.postFireDelay -= dt;
  }
}

// ===== Input =====
const keys = {};
const mouse = { left: false, right: false };
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') { e.preventDefault(); cycleLockOn(); }
  if (e.code === 'Digit1' || e.code === 'Numpad1') switchWeapon(1);
  if (e.code === 'Digit2' || e.code === 'Numpad2') switchWeapon(2);
});
addEventListener('keyup', e => keys[e.code] = false);
addEventListener('mousedown', e => {
  if (e.button === 0) mouse.left = true;
  if (e.button === 2) mouse.right = true;
});
addEventListener('mouseup', e => {
  if (e.button === 0) mouse.left = false;
  if (e.button === 2) mouse.right = false;
});
addEventListener('contextmenu', e => e.preventDefault());

let yaw = 0, pitch = -0.3;
addEventListener('mousemove', e => {
  if (document.pointerLockElement !== renderer.domElement) return;
  yaw -= e.movementX * 0.003;
  pitch -= e.movementY * 0.003;
  pitch = Math.max(-1.2, Math.min(0.5, pitch));
});

// ===== Lock-on =====
let tabLockedId = null;
let magnetLockedId = null;

function getLockTarget() {
  const id = magnetLockedId || tabLockedId;
  if (!id) return null;
  const p = remotePlayers.get(id);
  if (!p || !p.alive) return null;
  return p;
}

function cycleLockOn() {
  const alive = [...remotePlayers.values()].filter(p => p.alive);
  if (alive.length === 0) { tabLockedId = null; return; }

  const camFwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const candidates = alive.map(p => {
    const dx = p.group.position.x - myGroup.position.x;
    const dz = p.group.position.z - myGroup.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz) || 0.001;
    const dot = (dx/dist)*camFwd.x + (dz/dist)*camFwd.z;
    return { p, dot, dist };
  }).filter(c => c.dot > -0.3);
  if (candidates.length === 0) { tabLockedId = null; return; }

  if (tabLockedId) {
    const sorted = [...candidates].sort((a, b) => b.dot - a.dot);
    const idx = sorted.findIndex(c => c.p.id === tabLockedId);
    if (idx >= 0) {
      tabLockedId = sorted[(idx + 1) % sorted.length].p.id;
      return;
    }
  }
  candidates.sort((a, b) => b.dot - a.dot);
  tabLockedId = candidates[0].p.id;
}

function updateMagnetLock() {
  if (!mouse.right) { magnetLockedId = null; return; }
  const alive = [...remotePlayers.values()].filter(p => p.alive);
  if (alive.length === 0) { magnetLockedId = null; return; }
  const camFwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  let best = null, bestScore = -Infinity;
  for (const p of alive) {
    const dx = p.group.position.x - myGroup.position.x;
    const dz = p.group.position.z - myGroup.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 60) continue;
    const dot = (dx/dist)*camFwd.x + (dz/dist)*camFwd.z;
    if (dot < -0.5) continue;
    const score = -dist + dot * 15;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  magnetLockedId = best ? best.id : null;
}

// ===== Projectiles (visual only, hit is server-authoritative) =====
const projectiles = [];
function spawnBeamVisual(origin, direction, color, type = 'mg') {
  if (type === 'beam') {
    // Hitscan beam: instant long pillar that fades out
    spawnHitscanBeam(origin, direction, color);
    return;
  }
  // Machine gun: fast-moving projectile
  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 1.2, 8),
    new THREE.MeshBasicMaterial({ color })
  );
  beam.position.copy(origin);
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, direction.clone().normalize());
  beam.quaternion.copy(quat);
  scene.add(beam);

  const light = new THREE.PointLight(color, 2, 8);
  light.position.copy(origin);
  scene.add(light);
  setTimeout(() => scene.remove(light), 80);

  projectiles.push({
    mesh: beam,
    velocity: direction.clone().normalize().multiplyScalar(80),
    life: 1.0
  });
}

// Hitscan beam: instantly spawns a long pillar that fades over ~0.4s
function spawnHitscanBeam(origin, direction, color) {
  const dir = direction.clone().normalize();
  const length = 100; // weapon range
  const center = origin.clone().add(dir.clone().multiplyScalar(length / 2));

  // Core beam (bright, thick)
  const core = new THREE.Mesh(
    new THREE.CylinderGeometry(0.35, 0.35, length, 12, 1, true),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 1.0,
      side: THREE.DoubleSide
    })
  );
  core.position.copy(center);
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
  core.quaternion.copy(quat);
  scene.add(core);

  // Outer glow (softer, wider)
  const glow = new THREE.Mesh(
    new THREE.CylinderGeometry(0.9, 0.9, length, 12, 1, true),
    new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.6,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    })
  );
  glow.position.copy(center);
  glow.quaternion.copy(quat);
  scene.add(glow);

  // Muzzle flash light
  const flashLight = new THREE.PointLight(color, 8, 20);
  flashLight.position.copy(origin);
  scene.add(flashLight);

  // Store for fade-out animation
  beamEffects.push({
    core, glow, flashLight,
    life: 0.45,
    maxLife: 0.45
  });
}

// Beam effects (hitscan beams) - separate from projectiles because they don't travel
const beamEffects = [];

const effects = [];
function createExplosion(position, color = 0xff8800) {
  for (let i = 0; i < 12; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 6, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 })
    );
    p.position.copy(position);
    const v = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 6,
      (Math.random() - 0.5) * 8
    );
    scene.add(p);
    effects.push({ mesh: p, velocity: v, life: 0.6, maxLife: 0.6 });
  }
  const light = new THREE.PointLight(color, 3, 15);
  light.position.copy(position);
  scene.add(light);
  setTimeout(() => scene.remove(light), 200);
}

// ===== Collision with obstacles =====
function checkObstacleCollision(pos, radius = 0.7) {
  for (const ob of obstacles) {
    const m = ob.mesh;
    const minX = m.position.x - ob.w/2, maxX = m.position.x + ob.w/2;
    const minZ = m.position.z - ob.d/2, maxZ = m.position.z + ob.d/2;
    const maxY = ob.h;
    const closestX = Math.max(minX, Math.min(pos.x, maxX));
    const closestZ = Math.max(minZ, Math.min(pos.z, maxZ));
    const dx = pos.x - closestX, dz = pos.z - closestZ;
    const distSq = dx*dx + dz*dz;
    if (distSq < radius * radius && pos.y < maxY - 0.3) {
      const dist = Math.sqrt(distSq) || 0.001;
      pos.x = closestX + (dx / dist) * radius;
      pos.z = closestZ + (dz / dist) * radius;
    }
  }
}

// ===== HUD =====
const hpFill = document.getElementById('hp-fill');
const hpText = document.getElementById('hp-text');
const boostFill = document.getElementById('boost-fill');
const boostText = document.getElementById('boost-text');
const damageFlash = document.getElementById('damage-flash');
const playerCountEl = document.getElementById('player-count');
const playerListEl = document.getElementById('player-list');
const killLogEl = document.getElementById('kill-log');
const lockonIndicator = document.getElementById('lockon-indicator');

function updateHUD() {
  hpFill.style.width = (playerState.hp / playerState.maxHp * 100) + '%';
  hpText.textContent = `${Math.ceil(playerState.hp)} / ${playerState.maxHp}`;
  boostFill.style.width = playerState.boost + '%';
  boostText.textContent = Math.ceil(playerState.boost) + '%';
  boostFill.classList.toggle('overheat', playerState.overheat);
  damageFlash.style.opacity = playerState.hitFlash;

  // Weapons
  for (const n of [1, 2]) {
    const w = playerState.weapons[n];
    const slot = document.getElementById('weapon-' + n);
    const ammoEl = document.getElementById('w' + n + '-ammo');
    const statusEl = document.getElementById('w' + n + '-status');
    slot.classList.toggle('active', playerState.currentWeapon === n);

    ammoEl.textContent = `${w.ammo} / ${w.maxAmmo}`;

    let status = '';
    if (n === 1) {
      slot.classList.toggle('reloading', w.reloading);
      if (w.reloading) {
        status = `재장전 ${w.reloadRemaining.toFixed(1)}s`;
      }
    } else {
      slot.classList.toggle('reloading', w.ammo === 0);
      if (w.ammo < w.maxAmmo && w._recharging) {
        status = `충전 ${w.reloadRemaining.toFixed(1)}s`;
      }
      if (playerState.currentWeapon === 2 && playerState.postFireDelay > 0) {
        status = `후딜 ${playerState.postFireDelay.toFixed(1)}s`;
      }
    }
    statusEl.textContent = status;
  }

  playerCountEl.textContent = remotePlayers.size + 1;
  let list = '';
  list += `<div style="color:#7cf">${getMyName()} (you)</div>`;
  for (const p of remotePlayers.values()) {
    const alive = p.alive ? '' : ' 💀';
    list += `<div>${p.name}${alive}</div>`;
  }
  playerListEl.innerHTML = list;
}

function addKillMsg(text) {
  const div = document.createElement('div');
  div.className = 'kill-msg';
  div.textContent = text;
  killLogEl.appendChild(div);
  setTimeout(() => div.remove(), 5000);
}

// ===== Networking =====
let ws = null;
let myName = '';
function getMyName() { return myName; }

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${proto}//${location.host}`;
  const status = document.getElementById('status');
  status.textContent = '서버 연결 중...';
  ws = new WebSocket(url);

  ws.onopen = () => {
    status.textContent = '연결됨. Join 전송...';
    ws.send(JSON.stringify({ type: 'join', name: myName }));
  };

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    handleMessage(msg);
  };

  ws.onclose = () => {
    status.textContent = '연결 끊김. 새로고침해주세요.';
    document.getElementById('connect-msg').classList.remove('hidden');
    document.getElementById('hud-top').classList.add('hidden');
    document.getElementById('hud-right').classList.add('hidden');
    document.getElementById('hud-bottom').classList.add('hidden');
    document.getElementById('crosshair').classList.add('hidden');
  };

  ws.onerror = () => {
    status.textContent = '연결 오류';
  };
}

function addRemotePlayer(pData) {
  if (pData.id === myId) return;
  const color = pData.color || { primary: 0xcccccc, secondary: 0x666666, accent: 0xffffff };
  const data = createRobot(color.primary, color.secondary, color.accent);
  data.group.position.set(pData.x, pData.y, pData.z);
  data.group.rotation.y = pData.rotY || 0;
  scene.add(data.group);
  const bar = createHealthBar(pData.name);
  bar.sprite.position.y = 3;
  data.group.add(bar.sprite);
  updateHealthBar(bar, pData.hp, 100);

  remotePlayers.set(pData.id, {
    id: pData.id,
    name: pData.name,
    color,
    group: data.group,
    robotData: data,
    hpBar: bar,
    targetX: pData.x, targetY: pData.y, targetZ: pData.z,
    targetRotY: pData.rotY || 0,
    prevX: pData.x, prevY: pData.y, prevZ: pData.z,
    hp: pData.hp,
    alive: pData.alive,
    walkCycle: 0
  });
}

function removeRemotePlayer(id) {
  const p = remotePlayers.get(id);
  if (p) {
    scene.remove(p.group);
    remotePlayers.delete(id);
  }
  if (tabLockedId === id) tabLockedId = null;
  if (magnetLockedId === id) magnetLockedId = null;
}

function handleMessage(msg) {
  if (msg.type === 'welcome') {
    myId = msg.id;
    // Build own robot
    const c = msg.color;
    myRobotData = createRobot(c.primary, c.secondary, c.accent);
    myGroup = myRobotData.group;
    myGroup.position.set(msg.spawn.x, msg.spawn.y, msg.spawn.z);
    scene.add(myGroup);

    for (const p of msg.players) {
      if (p.id !== myId) addRemotePlayer(p);
    }
    // Show game UI
    document.getElementById('connect-msg').classList.add('hidden');
    document.getElementById('hud-top').classList.remove('hidden');
    document.getElementById('hud-right').classList.remove('hidden');
    document.getElementById('hud-bottom').classList.remove('hidden');
    document.getElementById('crosshair').classList.remove('hidden');
    renderer.domElement.requestPointerLock();
  }
  else if (msg.type === 'player_joined') {
    addRemotePlayer(msg.player);
    addKillMsg(`${msg.player.name} 참가`);
  }
  else if (msg.type === 'player_left') {
    const p = remotePlayers.get(msg.id);
    if (p) addKillMsg(`${p.name} 퇴장`);
    removeRemotePlayer(msg.id);
  }
  else if (msg.type === 'snapshot') {
    for (const ps of msg.players) {
      if (ps.id === myId) continue;
      const rp = remotePlayers.get(ps.id);
      if (!rp) continue;
      rp.prevX = rp.group.position.x;
      rp.prevY = rp.group.position.y;
      rp.prevZ = rp.group.position.z;
      rp.targetX = ps.x;
      rp.targetY = ps.y;
      rp.targetZ = ps.z;
      rp.targetRotY = ps.rotY;
      if (rp.hp !== ps.hp) {
        rp.hp = ps.hp;
        updateHealthBar(rp.hpBar, rp.hp, 100);
      }
      rp.alive = ps.alive;
      rp.group.visible = ps.alive;
    }
  }
  else if (msg.type === 'shoot_fx') {
    if (msg.shooterId === myId) return;
    const origin = new THREE.Vector3(msg.origin.x, msg.origin.y, msg.origin.z);
    const target = new THREE.Vector3(msg.target.x, msg.target.y, msg.target.z);
    const dir = target.clone().sub(origin).normalize();
    const shooter = remotePlayers.get(msg.shooterId);
    const type = msg.weapon === 2 ? 'beam' : 'mg';
    const color = type === 'beam' ? 0xffaa00 : (shooter ? shooter.color.accent : 0xff8800);
    spawnBeamVisual(origin, dir, color, type);
  }
  else if (msg.type === 'damage') {
    if (msg.targetId === myId) {
      playerState.hp = msg.hp;
      playerState.hitFlash = 1;
    } else {
      const rp = remotePlayers.get(msg.targetId);
      if (rp) {
        rp.hp = msg.hp;
        updateHealthBar(rp.hpBar, rp.hp, 100);
      }
    }
  }
  else if (msg.type === 'death') {
    const victim = msg.victimId === myId ? { name: getMyName() } : remotePlayers.get(msg.victimId);
    const killer = msg.killerId === myId ? { name: getMyName() } : remotePlayers.get(msg.killerId);
    if (victim && killer) {
      addKillMsg(`${killer.name} ▶ ${victim.name}`);
    }
    if (msg.victimId === myId) {
      playerState.alive = false;
      playerState.hp = 0;
    } else {
      const rp = remotePlayers.get(msg.victimId);
      if (rp) { rp.alive = false; rp.group.visible = false; }
    }
  }
  else if (msg.type === 'respawn') {
    if (msg.id === myId) {
      myGroup.position.set(msg.x, msg.y, msg.z);
      playerState.hp = msg.hp;
      playerState.boost = playerState.maxBoost;
      playerState.alive = true;
      playerState.velocity.set(0, 0, 0);
      // Reset weapons
      playerState.weapons[1].ammo = playerState.weapons[1].maxAmmo;
      playerState.weapons[1].reloading = false;
      playerState.weapons[1].reloadRemaining = 0;
      playerState.weapons[2].ammo = playerState.weapons[2].maxAmmo;
      playerState.weapons[2]._recharging = false;
      playerState.weapons[2].reloadRemaining = 0;
      playerState.postFireDelay = 0;
      playerState.currentWeapon = 1;
    } else {
      const rp = remotePlayers.get(msg.id);
      if (rp) {
        rp.group.position.set(msg.x, msg.y, msg.z);
        rp.targetX = msg.x; rp.targetY = msg.y; rp.targetZ = msg.z;
        rp.prevX = msg.x; rp.prevY = msg.y; rp.prevZ = msg.z;
        rp.hp = msg.hp;
        rp.alive = true;
        rp.group.visible = true;
        updateHealthBar(rp.hpBar, rp.hp, 100);
      }
    }
  }
}

// ===== Pointer lock =====
document.addEventListener('pointerlockchange', () => {
  const locked = document.pointerLockElement === renderer.domElement;
  document.getElementById('crosshair').classList.toggle('hidden', !locked);
});

// ===== Connect flow =====
document.getElementById('connect-btn').addEventListener('click', () => {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('status').textContent = '이름을 입력해주세요';
    return;
  }
  myName = name;
  connectWS();
});

renderer.domElement.addEventListener('click', () => {
  if (myId && !document.pointerLockElement) {
    renderer.domElement.requestPointerLock();
  }
});

// ===== Physics =====
const GRAVITY = -25;
const clock = new THREE.Clock();
const aimPoint = new THREE.Vector3();
const raycaster = new THREE.Raycaster();

function updatePlayer(dt) {
  if (!myGroup) return;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  const moveDir = new THREE.Vector3();
  if (keys['KeyW']) moveDir.add(forward);
  if (keys['KeyS']) moveDir.sub(forward);
  if (keys['KeyD']) moveDir.add(right);
  if (keys['KeyA']) moveDir.sub(right);
  const moving = moveDir.lengthSq() > 0;
  if (moving) moveDir.normalize();

  const boosting = (keys['ShiftLeft'] || keys['ShiftRight']) && !playerState.overheat && playerState.boost > 0 && moving && playerState.postFireDelay <= 0;
  const speed = boosting ? 18 : 7;

  // During post-fire delay (beam cannon recovery), freeze horizontal movement
  if (playerState.postFireDelay > 0) {
    playerState.velocity.x = 0;
    playerState.velocity.z = 0;
  } else {
    playerState.velocity.x = moveDir.x * speed;
    playerState.velocity.z = moveDir.z * speed;
  }

  myRobotData.flame.visible = boosting;

  if (keys['Space'] && playerState.postFireDelay <= 0) {
    if (playerState.onGround) {
      playerState.velocity.y = 9;
      playerState.onGround = false;
      keys['Space'] = false;
    } else if (!playerState.overheat && playerState.boost > 15) {
      playerState.velocity.y = Math.min(playerState.velocity.y + 45 * dt, 10);
      playerState.boost -= 35 * dt;
    }
  }

  if (boosting) playerState.boost -= 25 * dt;
  else if (!keys['Space']) playerState.boost += (playerState.overheat ? 15 : 30) * dt;
  playerState.boost = Math.max(0, Math.min(playerState.maxBoost, playerState.boost));
  if (playerState.boost <= 0) playerState.overheat = true;
  if (playerState.overheat && playerState.boost >= 50) playerState.overheat = false;

  playerState.velocity.y += GRAVITY * dt;
  myGroup.position.x += playerState.velocity.x * dt;
  myGroup.position.z += playerState.velocity.z * dt;
  myGroup.position.y += playerState.velocity.y * dt;
  if (myGroup.position.y <= 0.4) {
    myGroup.position.y = 0.4;
    playerState.velocity.y = 0;
    playerState.onGround = true;
  }
  checkObstacleCollision(myGroup.position);

  // Rotation
  const lock = getLockTarget();
  let targetYaw;
  if (lock) {
    const dx = lock.group.position.x - myGroup.position.x;
    const dz = lock.group.position.z - myGroup.position.z;
    targetYaw = Math.atan2(dx, dz) + Math.PI;
  } else if (mouse.left || moving) {
    targetYaw = yaw + Math.PI;
  } else {
    targetYaw = myGroup.rotation.y;
  }
  let diff = targetYaw - myGroup.rotation.y;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  myGroup.rotation.y += diff * Math.min(dt * 12, 1);

  // Anim
  if (moving && playerState.onGround) {
    playerState.walkCycle += dt * speed * 0.8;
    const swing = Math.sin(playerState.walkCycle) * 0.5;
    myRobotData.legs[0].rotation.x = swing;
    myRobotData.legs[1].rotation.x = -swing;
    myRobotData.arms[0].rotation.x = -swing * 0.5;
    myRobotData.arms[1].rotation.x = swing * 0.5;
  } else {
    for (const p of [...myRobotData.legs, ...myRobotData.arms]) p.rotation.x *= 0.85;
  }

  // Firing
  playerState.fireCooldown -= dt;
  const currentW = playerState.weapons[playerState.currentWeapon];
  const canFire = mouse.left
    && playerState.fireCooldown <= 0
    && playerState.postFireDelay <= 0
    && playerState.alive
    && currentW.ammo > 0
    && !(playerState.currentWeapon === 1 && currentW.reloading);

  if (canFire) {
    playerState.fireCooldown = currentW.cooldown;
    currentW.ammo -= 1;

    // Machine gun triggers reload when empty
    if (playerState.currentWeapon === 1 && currentW.ammo <= 0) {
      currentW.reloading = true;
      currentW.reloadRemaining = currentW.reloadTime;
    }
    // Beam cannon: apply post-fire delay, reset recharge timer
    if (playerState.currentWeapon === 2) {
      playerState.postFireDelay = currentW.cooldown; // 1s lock
      if (!currentW._recharging) {
        currentW._recharging = true;
        currentW.reloadRemaining = currentW.reloadTime;
      }
    }

    const armOffset = new THREE.Vector3(0.7, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), myGroup.rotation.y);
    const origin = myGroup.position.clone().add(armOffset);
    origin.y += 1.0;

    const range = currentW.range;
    let targetPoint;
    let hitId = null;
    const fireLock = getLockTarget();
    if (fireLock) {
      const lockPos = fireLock.group.position.clone();
      lockPos.y += 1.0;
      const distToLock = origin.distanceTo(lockPos);
      if (distToLock <= range) {
        targetPoint = lockPos;
        hitId = fireLock.id;
      } else {
        // Out of range: shoot toward lock but don't claim hit
        targetPoint = lockPos;
      }
    } else {
      targetPoint = aimPoint.clone();
      // Client-side hitscan along beam within weapon range
      const shotDir = targetPoint.clone().sub(origin).normalize();
      let closestHit = null;
      let closestDist = Infinity;
      for (const rp of remotePlayers.values()) {
        if (!rp.alive) continue;
        const target = rp.group.position.clone();
        target.y += 1.0;
        const toTarget = target.clone().sub(origin);
        const projLen = toTarget.dot(shotDir);
        if (projLen < 0 || projLen > range) continue;
        const projPoint = origin.clone().add(shotDir.clone().multiplyScalar(projLen));
        const perpDist = projPoint.distanceTo(target);
        // Beam cannon has tighter hit radius (more skill-based)
        const hitRadius = playerState.currentWeapon === 2 ? 1.2 : 1.5;
        if (perpDist < hitRadius && projLen < closestDist) {
          closestDist = projLen;
          closestHit = rp;
        }
      }
      if (closestHit) {
        hitId = closestHit.id;
        targetPoint = closestHit.group.position.clone();
        targetPoint.y += 1.0;
      }
    }
    const dir = targetPoint.clone().sub(origin).normalize();

    // Visual: different look per weapon
    const myColor = myRobotData.visor.material.color.getHex();
    if (playerState.currentWeapon === 1) {
      spawnBeamVisual(origin, dir, myColor, 'mg');
    } else {
      spawnBeamVisual(origin, dir, 0xffaa00, 'beam');
    }

    // Report to server
    ws.send(JSON.stringify({
      type: 'shoot',
      weapon: playerState.currentWeapon,
      origin: { x: origin.x, y: origin.y, z: origin.z },
      target: { x: targetPoint.x, y: targetPoint.y, z: targetPoint.z },
      hitId: hitId
    }));
  }

  playerState.hitFlash = Math.max(0, playerState.hitFlash - dt * 2);
}

function updateRemotePlayers(dt) {
  for (const rp of remotePlayers.values()) {
    // Simple lerp to target
    rp.group.position.x += (rp.targetX - rp.group.position.x) * Math.min(dt * 10, 1);
    rp.group.position.y += (rp.targetY - rp.group.position.y) * Math.min(dt * 10, 1);
    rp.group.position.z += (rp.targetZ - rp.group.position.z) * Math.min(dt * 10, 1);
    let diff = rp.targetRotY - rp.group.rotation.y;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    rp.group.rotation.y += diff * Math.min(dt * 10, 1);

    // Simple walk cycle based on movement
    const dx = rp.targetX - rp.prevX;
    const dz = rp.targetZ - rp.prevZ;
    const moveMag = Math.sqrt(dx*dx + dz*dz);
    if (moveMag > 0.01) {
      rp.walkCycle += dt * 8;
      const swing = Math.sin(rp.walkCycle) * 0.4;
      rp.robotData.legs[0].rotation.x = swing;
      rp.robotData.legs[1].rotation.x = -swing;
    } else {
      rp.robotData.legs[0].rotation.x *= 0.85;
      rp.robotData.legs[1].rotation.x *= 0.85;
    }
  }
}

function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.mesh.position.addScaledVector(p.velocity, dt);
    p.life -= dt;
    if (p.life <= 0 || p.mesh.position.y < -5) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
    }
  }
}

function updateBeamEffects(dt) {
  for (let i = beamEffects.length - 1; i >= 0; i--) {
    const bf = beamEffects[i];
    bf.life -= dt;
    const ratio = bf.life / bf.maxLife;
    // Core fades a bit faster than glow
    bf.core.material.opacity = Math.max(0, ratio * ratio);
    bf.glow.material.opacity = Math.max(0, ratio * 0.6);
    // Beam "thickness" also shrinks slightly over time
    const thickScale = 0.7 + ratio * 0.3;
    bf.core.scale.x = thickScale;
    bf.core.scale.z = thickScale;
    bf.glow.scale.x = thickScale;
    bf.glow.scale.z = thickScale;
    // Light dims quickly
    bf.flashLight.intensity = 8 * ratio * ratio;

    if (bf.life <= 0) {
      scene.remove(bf.core);
      scene.remove(bf.glow);
      scene.remove(bf.flashLight);
      beamEffects.splice(i, 1);
    }
  }
}

function updateEffects(dt) {
  for (let i = effects.length - 1; i >= 0; i--) {
    const ef = effects[i];
    ef.mesh.position.addScaledVector(ef.velocity, dt);
    ef.velocity.y += GRAVITY * 0.5 * dt;
    ef.life -= dt;
    ef.mesh.material.opacity = ef.life / ef.maxLife;
    if (ef.life <= 0) {
      scene.remove(ef.mesh);
      effects.splice(i, 1);
    }
  }
}

function updateCamera() {
  if (!myGroup) return;
  const camDist = 5.5, camHeight = 2.2, shoulderOffset = 1.1;
  const backDir = new THREE.Vector3(Math.sin(yaw) * camDist, 0, Math.cos(yaw) * camDist);
  const rightDir = new THREE.Vector3(Math.cos(yaw) * shoulderOffset, 0, -Math.sin(yaw) * shoulderOffset);
  const targetCamPos = myGroup.position.clone().add(backDir).add(rightDir);
  targetCamPos.y += camHeight - pitch * 3;
  camera.position.lerp(targetCamPos, 0.18);

  const lookDir = new THREE.Vector3(
    -Math.sin(yaw) * Math.cos(pitch),
    Math.sin(pitch),
    -Math.cos(yaw) * Math.cos(pitch)
  );

  const camLock = getLockTarget();
  if (camLock) {
    const lookTarget = camLock.group.position.clone();
    lookTarget.y += 1.2;
    camera.lookAt(lookTarget);
  } else {
    const lookTarget = camera.position.clone().add(lookDir.multiplyScalar(50));
    camera.lookAt(lookTarget);
  }

  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const targets = [ground, ...obstacles.map(o => o.mesh), ...[...remotePlayers.values()].filter(p => p.alive).map(p => p.group)];
  const hits = raycaster.intersectObjects(targets, true);
  if (hits.length > 0) aimPoint.copy(hits[0].point);
  else aimPoint.copy(camera.position).add(raycaster.ray.direction.clone().multiplyScalar(200));
}

function updateLockOnIndicator() {
  const target = getLockTarget();
  if (target) {
    const pos = target.group.position.clone();
    pos.y += 2;
    const screen = pos.project(camera);
    if (screen.z < 1) {
      const x = (screen.x + 1) / 2 * innerWidth;
      const y = (-screen.y + 1) / 2 * innerHeight;
      lockonIndicator.style.display = 'block';
      lockonIndicator.style.left = x + 'px';
      lockonIndicator.style.top = y + 'px';
      lockonIndicator.style.borderColor = magnetLockedId ? '#ffcc00' : '#ff3030';
    } else lockonIndicator.style.display = 'none';
  } else lockonIndicator.style.display = 'none';
}

// ===== State transmission =====
let lastStateSent = 0;
function sendState() {
  if (!ws || ws.readyState !== WebSocket.OPEN || !myGroup) return;
  const now = performance.now();
  if (now - lastStateSent < 50) return; // 20Hz
  lastStateSent = now;
  ws.send(JSON.stringify({
    type: 'state',
    x: myGroup.position.x,
    y: myGroup.position.y,
    z: myGroup.position.z,
    rotY: myGroup.rotation.y
  }));
}

// ===== Main loop =====
function loop() {
  const dt = Math.min(clock.getDelta(), 0.05);
  if (myGroup) {
    updateMagnetLock();
    updateWeapons(dt);
    updatePlayer(dt);
    updateRemotePlayers(dt);
    updateProjectiles(dt);
    updateBeamEffects(dt);
    updateEffects(dt);
    updateCamera();
    updateLockOnIndicator();
    updateHUD();
    sendState();
  }
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

loop();
</script>
